# Render Blueprint for Two Wheel Obsession.
# Deploy via https://render.com/docs/blueprint-spec
# Region "singapore" — closest APAC region to the AU customer base
# (Render doesn't offer Sydney as of writing).

databases:
  - name: twowo-postgres
    databaseName: twowo
    user: twowo
    region: singapore
    plan: basic-256mb
    postgresMajorVersion: "16"

# Shared secrets referenced by both the web service and the sync cron.
# `fromService` env-var linking in Render only resolves at the *first*
# deploy — if the web service's secret is later rotated or set manually,
# the cron's copy goes stale and the cron starts hitting 401s. Putting
# the shared secret in an envVarGroup avoids that drift: the value is
# owned by the group and both services see whatever it currently is.
#
# After applying this blueprint, set SYNC_SECRET once in the Render
# dashboard (Env Groups → twowo-shared) and both services pick it up.
envVarGroups:
  - name: twowo-shared
    envVars:
      - key: SYNC_SECRET
        sync: false

services:
  - type: web
    name: twowo-site
    runtime: node
    region: singapore
    plan: starter
    rootDir: site
    # NODE_ENV=production at runtime is fine, but the build needs devDependencies
    # (tailwindcss, @tailwindcss/postcss, typescript). --include=dev forces them.
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    disk:
      name: twowo-media
      mountPath: /var/data/media
      sizeGB: 5
    envVarGroups:
      - twowo-shared
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URI
        fromDatabase:
          name: twowo-postgres
          property: connectionString
      - key: PAYLOAD_SECRET
        generateValue: true
      - key: FEED_SECRET
        generateValue: true
      - key: PAYLOAD_MEDIA_DIR
        value: /var/data/media
      - key: SITE_URL
        # Update to https://www.twowheelobsession.com.au once the custom domain is wired up.
        value: https://twowo-site.onrender.com
      # Yamaha OEM Parts Finder — paid EPC Online subscription
      - key: EPC_DEALER_ID
        value: 26ea01c9-ab51-41f3-8297-7adbde8fe872
      - key: EPC_PRODUCT_KEY_YAMAHA
        value: 324d31df-d5ab-4449-85a7-43e5a97c3e28
      # Email notifications via SendGrid (SMTP relay). Sign up at
      # sendgrid.com (free tier: 100 emails/day). Set SENDGRID_API_KEY in
      # the Render dashboard. EMAIL_FROM_ADDRESS must be verified in
      # SendGrid as a Single Sender or on a verified domain — once
      # twowheelobsession.com.au is on Cloudflare, add the SendGrid SPF
      # and DKIM CNAMEs there to verify the whole domain.
      - key: SENDGRID_API_KEY
        sync: false
      - key: EMAIL_FROM_ADDRESS
        value: enquiries@twowheelobsession.com.au
      - key: EMAIL_FROM_NAME
        value: Two Wheel Obsession
      - key: ENQUIRY_NOTIFY_EMAIL
        value: enquiries@twowheelobsession.com.au

  - type: cron
    name: twowo-yamaha-sync
    runtime: node
    region: singapore
    plan: starter
    rootDir: site
    # Hourly, 5 mins past the hour. Cheap (a sync run takes ~10 sec).
    schedule: "5 * * * *"
    buildCommand: "echo no build needed"
    startCommand: node scripts/sync-yamaha-cron.mjs
    envVarGroups:
      - twowo-shared
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: SITE_URL
        fromService:
          name: twowo-site
          type: web
          envVarKey: SITE_URL
