# Render Blueprint for Two Wheel Obsession.
# Deploy via https://render.com/docs/blueprint-spec
# Region "syd" = Sydney, closest to the customer base.

databases:
  - name: twowo-postgres
    databaseName: twowo
    user: twowo
    region: syd
    plan: basic-256mb
    postgresMajorVersion: "16"

services:
  - type: web
    name: twowo-site
    runtime: node
    region: syd
    plan: starter
    rootDir: site
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    disk:
      name: twowo-media
      mountPath: /var/data/media
      sizeGB: 5
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URI
        fromDatabase:
          name: twowo-postgres
          property: connectionString
      - key: PAYLOAD_SECRET
        generateValue: true
      - key: SYNC_SECRET
        generateValue: true
      - key: FEED_SECRET
        generateValue: true
      - key: PAYLOAD_MEDIA_DIR
        value: /var/data/media
      - key: SITE_URL
        # Update to https://www.twowheelobsession.com.au once the custom domain is wired up.
        value: https://twowo-site.onrender.com

  - type: cron
    name: twowo-yamaha-sync
    runtime: node
    region: syd
    plan: starter
    rootDir: site
    # Hourly, 5 mins past the hour. Cheap (a sync run takes ~10 sec).
    schedule: "5 * * * *"
    buildCommand: "echo no build needed"
    startCommand: node scripts/sync-yamaha-cron.mjs
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: SITE_URL
        fromService:
          name: twowo-site
          type: web
          envVarKey: SITE_URL
      - key: SYNC_SECRET
        fromService:
          name: twowo-site
          type: web
          envVarKey: SYNC_SECRET
